name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Run Tests
        run: npm test

  deploy:
    needs: test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Inject GAS URL
        env:
          GAS_URL: ${{ secrets.GAS_URL }}
        run: sed -i "s|GAS_URL_PLACEHOLDER|${GAS_URL}|g" src/environments/environment.prod.ts

      - name: Verify GAS URL injection
        run: |
          if grep -q "GAS_URL_PLACEHOLDER" src/environments/environment.prod.ts; then
            echo "ERROR: GAS_URL secret was not injected. Add GAS_URL to the github-pages environment secrets."
            exit 1
          fi
          echo "GAS URL injected successfully."

      - name: Build
        run: npm run build -- --base-href /StackConnect-App-Dev/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
